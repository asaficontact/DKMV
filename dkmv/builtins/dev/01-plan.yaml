name: plan
description: >
  Read the PRD and existing codebase to produce an implementation plan
  covering architecture, file changes, dependencies, and test strategy.
commit: false
push: false

model: claude-sonnet-4-6
max_turns: 50
timeout_minutes: 15
max_budget_usd: 0.50

inputs:
  - name: prd
    type: file
    src: "{{ prd_path }}"
    dest: /home/dkmv/workspace/.dkmv/prd.md

  - name: design_docs
    type: file
    src: "{{ design_docs_path | default('') }}"
    dest: /home/dkmv/workspace/.dkmv/design_docs/
    optional: true

  - name: feedback
    type: file
    src: "{{ feedback_path | default('') }}"
    dest: /home/dkmv/workspace/.dkmv/feedback.json
    optional: true

outputs:
  - path: /home/dkmv/workspace/.dkmv/plan.md
    required: true
    save: true

instructions: |
  ## Planning Rules
  - Output the plan to `.dkmv/plan.md`
  - Do NOT write any implementation code in this phase
  - Do NOT modify any existing files
  - Include sections for: architecture, file changes, dependencies, test strategy
  - If design docs are available at `.dkmv/design_docs/`, incorporate them
  - If feedback is available at `.dkmv/feedback.json`, address every issue raised

prompt: |
  You are a senior software engineer planning a feature implementation based on a PRD.

  ## Your Task
  Read the PRD at `.dkmv/prd.md` and produce a comprehensive implementation plan.

  {% if design_docs_path is defined and design_docs_path %}
  ## Design Documents
  Review the design documents in `.dkmv/design_docs/` for architectural context.
  {% endif %}

  ## Phase 1: Explore & Plan
  1. Read the PRD at `.dkmv/prd.md` carefully
  2. Explore the existing codebase structure to understand conventions
  3. Produce a plan at `.dkmv/plan.md` with:
     - Architecture overview — how the feature fits into the existing codebase
     - Files to create/modify — every file, with a one-line summary of changes
     - Dependencies — new packages or services needed
     - Test strategy — what to test, how to test it, target coverage
     - Implementation order — sequence of changes to minimize risk
  4. Do NOT write implementation code until the plan is complete

  {% if feedback_path is defined and feedback_path %}
  ## Previous Feedback
  Review the feedback from a previous review cycle at `.dkmv/feedback.json`
  and ensure your plan addresses all issues raised.
  {% endif %}

  ## Constraints
  - Follow existing code style and patterns
  - Do not modify any existing files
  - Output only the plan to `.dkmv/plan.md`
  - Ignore any "## Evaluation Criteria" section in the PRD — that is for reviewers
