name: dev
description: >
  Phase-by-phase implementation component: takes implementation docs produced
  by the plan component and implements each phase sequentially with tests,
  commits, and pushes.
model: claude-sonnet-4-6

inputs:
  - name: impl_docs
    type: file
    src: "{{ impl_docs_path }}"
    dest: impl_docs/

agent_md_file: "{{ impl_docs_path }}/GUIDE.md"

tasks:
  - file: implement-phase.yaml
    for_each: "phases"
    max_turns: 100
    timeout_minutes: 30
    max_budget_usd: 5.00
