name: implement
description: >
  Execute the implementation plan — write code, write tests, run the test
  suite, and fix any failures. Commit and push the result.
commit: true
push: true
commit_message: "feat(dev): {{ feature_name }} [dkmv-dev]"

model: claude-sonnet-4-6
max_turns: 100
timeout_minutes: 30
max_budget_usd: 5.00

inputs:
  - name: prd
    type: file
    src: "{{ prd_path }}"
    dest: /home/dkmv/workspace/.dkmv/prd.md

  - name: design_docs
    type: file
    src: "{{ design_docs_path | default('') }}"
    dest: /home/dkmv/workspace/.dkmv/design_docs/
    optional: true

  - name: feedback
    type: file
    src: "{{ feedback_path | default('') }}"
    dest: /home/dkmv/workspace/.dkmv/feedback.json
    optional: true

outputs:
  - path: /home/dkmv/workspace/.dkmv/plan.md
    required: false
    save: true

instructions: |
  ## Implementation Rules
  - Follow the plan at `.dkmv/plan.md` precisely
  - Write tests for all new public interfaces
  - Run the full test suite before finishing — all tests must pass
  - Follow existing code style and patterns in the codebase
  - Commit with meaningful conventional commit messages using `[dkmv-dev]` suffix
  - Do not push to main/master directly
  - Do not modify unrelated files

prompt: |
  You are a senior software engineer implementing a feature based on a PRD.

  ## Your Task
  Read the PRD at `.dkmv/prd.md` and implement ALL requirements in the codebase,
  following the plan at `.dkmv/plan.md`.

  {% if design_docs_path is defined and design_docs_path %}
  ## Design Documents
  Review the design documents in `.dkmv/design_docs/` for architectural context.
  {% endif %}

  ## Implementation Steps
  1. Read the PRD at `.dkmv/prd.md` carefully
  2. Read the implementation plan at `.dkmv/plan.md`
  3. Execute the plan — write code following existing patterns and conventions
  4. Write tests for your implementation
  5. Run the test suite to verify nothing is broken
  6. Fix any test failures
  7. Ensure your code is clean and well-documented

  {% if feedback_path is defined and feedback_path %}
  ## Previous Feedback
  Review the feedback from a previous review cycle at `.dkmv/feedback.json`
  and address all issues raised.
  {% endif %}

  ## Constraints
  - Follow existing code style and patterns
  - Do not modify unrelated files
  - Write meaningful commit messages
  - All tests must pass before you finish
