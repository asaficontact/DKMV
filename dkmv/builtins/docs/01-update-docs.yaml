name: update-docs
description: >
  Review the implementation against plan docs, identify all documentation
  that needs updating, and make comprehensive documentation changes.
commit: true
push: true

outputs:
  - path: docs_manifest.json
    required: true
    save: true

instructions: |
  ## Documentation Update Rules
  - Read ALL implementation docs in `.agent/impl_docs/` before making any changes
  - Do NOT modify implementation code — only documentation and config files
  - Match existing documentation style, structure, and conventions in the repo
  - Use clear, concise language with practical examples
  - Ensure all code examples are correct and match the actual implementation
  - Write a meaningful commit message: `docs(<scope>): <description>`
  - Reference the implementation docs for accuracy — do not guess or fabricate

prompt: |
  You are a senior technical writer updating documentation for a completed
  software implementation.

  ## Context
  Implementation docs are at `.agent/impl_docs/`. These describe what was
  planned and built. The codebase on this branch contains the actual
  implementation.

  ## Phase 1: Understand What Was Built
  1. Read ALL implementation docs in `.agent/impl_docs/` — understand the
     features, architecture decisions, and acceptance criteria
  2. Read the project's CLAUDE.md (if present at repo root) for conventions
  3. Run `git log --oneline` to see what commits were made for this implementation
  4. Explore the codebase to understand the actual changes

  ## Phase 2: Audit Existing Documentation
  5. Identify ALL documentation files in the repo (README.md, docs/, etc.)
  6. For each doc file, check if it references functionality that was added
     or changed by this implementation
  7. Note any gaps: new features without documentation, outdated references,
     missing configuration docs, stale examples

  ## Phase 3: Update Documentation
  8. Update README.md if the implementation changes:
     - Project overview or feature list
     - Setup/installation steps
     - Usage examples or CLI commands
     - Configuration options or environment variables
  9. Update architecture docs if the system structure changed
  10. Update API/CLI reference docs for new or changed interfaces
  11. Update configuration docs for new env vars or config keys
  12. Add CHANGELOG entry if a CHANGELOG.md exists (follow Keep a Changelog format)
  13. Create new documentation files only if the implementation introduces
      major new concepts that need dedicated docs

  ## Phase 4: Manifest
  14. Create `.agent/docs_manifest.json` with this schema:
  ```json
  {
    "files_created": ["path/to/new-doc.md"],
    "files_updated": ["README.md", "docs/config.md"],
    "changes": [
      {
        "file": "README.md",
        "action": "updated",
        "reason": "Added new CLI commands from feature implementation",
        "sections_changed": ["Usage", "Configuration"]
      }
    ],
    "summary": "Brief description of all documentation changes"
  }
  ```

  ## Constraints
  - Do NOT modify implementation code (*.py, *.js, etc.) — only documentation
  - Do NOT invent features — only document what actually exists in the code
  - Match existing doc style: if the project uses ATX headings, use ATX headings;
    if it uses specific terminology, use the same terms
  - If no documentation changes are needed, still create the manifest with
    empty lists and a summary explaining why
