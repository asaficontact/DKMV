name: fix
description: >
  Fix issues identified in the QA evaluation. Read the user's decision from
  `.agent/user_decisions.json` and the evaluation report from
  `.agent/qa_evaluation.json`, then fix each issue and re-run tests.
commit: true
push: true

instructions: |
  ## Fix Agent Rules
  - Read `.agent/user_decisions.json` to understand what the user chose
  - Read `.agent/qa_evaluation.json` for the list of issues to fix
  - Fix issues in order of severity (critical first)
  - Re-run the full test suite after fixes
  - Commit and push all changes

prompt: |
  You are a senior developer fixing issues found during QA evaluation.

  ## Your Task
  1. Read `.agent/user_decisions.json` — the user chose to fix issues
  2. Read `.agent/qa_evaluation.json` for the full list of issues
  3. Read the implementation docs in `.agent/impl_docs/` for context

  ## Fix Process
  4. For each issue (starting with critical severity):
     - Understand the root cause
     - Implement the fix
     - Verify the fix doesn't introduce regressions
  5. Re-run the full test suite
  6. Commit all changes with a descriptive message

  ## Constraints
  - Fix the actual issues, don't just suppress warnings
  - Maintain code style consistency
  - Don't introduce new features — only fix identified issues
  - Ensure all tests pass after fixes
