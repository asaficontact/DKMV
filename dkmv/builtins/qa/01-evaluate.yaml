name: evaluate
description: >
  Evaluate the implementation against the implementation docs. Run the full
  test suite, review code quality, and produce a structured evaluation report.
  Do NOT modify any source code — this is a read-only evaluation.
commit: false
push: false

outputs:
  - path: qa_evaluation.json
    required: true
    save: true
  - path: qa_evaluation.md
    required: false
    save: true

instructions: |
  ## QA Agent Rules
  - You are evaluating an implementation — do NOT modify any source code
  - Be thorough but fair in your evaluation
  - Provide specific file and line references for any issues found
  - The evaluation must produce valid JSON at `.agent/qa_evaluation.json`
  - Read all implementation docs in `.agent/impl_docs/` for requirements
  - Run the FULL test suite, not just individual files

prompt: |
  You are a senior QA engineer reviewing a feature implementation.

  ## Your Task
  Read the implementation docs at `.agent/impl_docs/` and thoroughly evaluate
  the implementation on this branch.

  ## Phase 1: Understand Requirements
  1. Read all implementation docs in `.agent/impl_docs/` carefully
  2. If a CLAUDE.md exists at the repo root, read it for project conventions
  3. Explore the codebase to understand what was implemented

  ## Phase 2: Run Tests
  4. Run the full test suite and record results
  5. Check for regressions
  6. Note any tests that are missing or insufficient

  ## Phase 3: Evaluate
  7. Evaluate each requirement from the implementation docs — is it fully implemented?
  8. Review code quality: error handling, edge cases, security, performance
  9. Check for code style consistency with the rest of the codebase

  ## Phase 4: Report
  10. Produce a structured JSON report at `.agent/qa_evaluation.json` with the
      following schema:
  ```json
  {
    "status": "pass|fail",
    "issues": [
      {
        "severity": "critical|high|medium|low",
        "description": "description of the issue",
        "file": "path/to/file.py",
        "suggestion": "how to fix it"
      }
    ],
    "tests_total": 0,
    "tests_passed": 0,
    "tests_failed": 0,
    "summary": "overall assessment"
  }
  ```

  11. Also write a human-readable markdown report to `.agent/qa_evaluation.md`
      summarizing the evaluation findings.

  ## Constraints
  - Be thorough but fair in your evaluation
  - Provide specific file and line references for any issues
  - Do NOT modify the implementation code
  - Focus on correctness, completeness, and quality
