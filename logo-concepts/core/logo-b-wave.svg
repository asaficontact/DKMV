<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes wave-undulate {
        0% {
          d: path('M 20 200 Q 60 160 100 200 T 180 200 T 260 200 T 340 200 T 420 200');
        }
        25% {
          d: path('M 20 200 Q 60 150 100 200 T 180 200 T 260 200 T 340 200 T 420 200');
        }
        50% {
          d: path('M 20 200 Q 60 160 100 200 T 180 200 T 260 200 T 340 200 T 420 200');
        }
        75% {
          d: path('M 20 200 Q 60 150 100 200 T 180 200 T 260 200 T 340 200 T 420 200');
        }
        100% {
          d: path('M 20 200 Q 60 160 100 200 T 180 200 T 260 200 T 340 200 T 420 200');
        }
      }

      .wave-line {
        animation: wave-undulate 4s ease-in-out infinite;
        animation-fill-mode: forwards;
      }
    </style>

    <!-- Gradient for wave: purple → hot pink → orange -->
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for wave -->
    <filter id="wave-glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="400" height="400" fill="#09090b" rx="48"/>

  <!-- Glow layer (background) -->
  <g filter="url(#wave-glow)" opacity="0.4">
    <path d="M 20 200 Q 60 160 100 200 T 180 200 T 260 200 T 340 200"
          stroke="#a855f7" stroke-width="48" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main wave line -->
  <g filter="url(#wave-glow)">
    <path class="wave-line" d="M 20 200 Q 60 160 100 200 T 180 200 T 260 200 T 340 200"
          stroke="url(#waveGradient)" stroke-width="20" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
