<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse-bar {
        0%, 100% { height: 120px; }
        50% { height: 180px; }
      }
      @keyframes pulse-bar-delay1 {
        0%, 100% { height: 140px; }
        50% { height: 200px; }
      }
      @keyframes pulse-bar-delay2 {
        0%, 100% { height: 160px; }
        50% { height: 220px; }
      }
      @keyframes pulse-bar-delay3 {
        0%, 100% { height: 180px; }
        50% { height: 240px; }
      }

      .bar {
        animation-duration: 3s;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-fill-mode: forwards;
        transform-origin: bottom;
      }

      .bar-1 {
        animation-name: pulse-bar;
        animation-delay: 0s;
      }
      .bar-2 {
        animation-name: pulse-bar-delay1;
        animation-delay: 0.2s;
      }
      .bar-3 {
        animation-name: pulse-bar-delay2;
        animation-delay: 0.4s;
      }
      .bar-4 {
        animation-name: pulse-bar-delay3;
        animation-delay: 0.6s;
      }
      .bar-5 {
        animation-name: pulse-bar-delay2;
        animation-delay: 0.8s;
      }
      .bar-6 {
        animation-name: pulse-bar-delay1;
        animation-delay: 1s;
      }
      .bar-7 {
        animation-name: pulse-bar;
        animation-delay: 1.2s;
      }
    </style>
    <linearGradient id="barGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark background with rounded corners -->
  <rect width="400" height="400" fill="#09090b" rx="48"/>

  <!-- Subtle glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Equalizer bars -->
  <g filter="url(#glow)" transform="translate(0, 200)">
    <!-- Bar 1 -->
    <rect class="bar bar-1" x="50" y="-60" width="24" height="120" fill="url(#barGradient)" rx="12"/>

    <!-- Bar 2 -->
    <rect class="bar bar-2" x="96" y="-70" width="24" height="140" fill="url(#barGradient)" rx="12"/>

    <!-- Bar 3 -->
    <rect class="bar bar-3" x="142" y="-80" width="24" height="160" fill="url(#barGradient)" rx="12"/>

    <!-- Bar 4 (Center - Tallest) -->
    <rect class="bar bar-4" x="188" y="-90" width="24" height="180" fill="url(#barGradient)" rx="12"/>

    <!-- Bar 5 -->
    <rect class="bar bar-5" x="234" y="-80" width="24" height="160" fill="url(#barGradient)" rx="12"/>

    <!-- Bar 6 -->
    <rect class="bar bar-6" x="280" y="-70" width="24" height="140" fill="url(#barGradient)" rx="12"/>

    <!-- Bar 7 -->
    <rect class="bar bar-7" x="326" y="-60" width="24" height="120" fill="url(#barGradient)" rx="12"/>
  </g>
</svg>
